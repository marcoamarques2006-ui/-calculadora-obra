<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Calculadora de Materiais para Obra</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0;
               background: #f3f4f6; color: #1f2937; }
        header { background: #b91c1c; color: #fff; padding: 16px 24px; }
        header h1 { margin: 0; font-size: 1.3rem; }
        nav a { color: #fff; margin-right: 18px; text-decoration: none; font-weight: 600; }
        nav a:hover { text-decoration: underline; }
        main { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 10px; padding: 20px 24px; margin-bottom: 20px;
                box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        h2 { margin-top: 0; color: #b91c1c; }
        label { display: block; font-weight: 600; margin: 8px 0 4px; font-size: .9rem; }
        input[type=text], input[type=number] { width: 100%; padding: 8px; border: 1px solid #d1d5db;
                border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th, td { border: 1px solid #e5e7eb; padding: 8px; text-align: left; font-size: .9rem; }
        th { background: #f9fafb; }
        .btn { background: #b91c1c; color: #fff; border: none; padding: 10px 18px; border-radius: 6px;
               cursor: pointer; font-weight: 600; }
        .btn:hover { background: #991b1b; }
        .btn-sec { background: #6b7280; }
        .btn-sec:hover { background: #4b5563; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .msg-error { color: #b91c1c; font-weight: 600; }
        .msg-info { color: #047857; font-weight: 600; }
        .msg-warn { color: #b45309; font-weight: 600; }
        .total { font-size: 1.4rem; color: #047857; font-weight: 700; }
        .muted { color: #6b7280; font-size: .85rem; }
        .parede-box { border: 1px dashed #d1d5db; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    </style>
</h:head>
<h:body>
    <header>
        <h1>🏠 Calculadora de Materiais para Obra Residencial</h1>
        <nav>
            <h:link outcome="/orcamento" value="Novo Orçamento"/>
            <h:link outcome="/consulta" value="Consultar Orçamentos"/>
        </nav>
    </header>
    <main>
        <ui:insert name="conteudo"/>
    </main>
</h:body>
</html>
